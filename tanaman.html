<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info Tanaman - Sadaya Tani Track</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f4; color: #1a1a1a; font-size: 14px; }
    .topbar { background: #1D9E75; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .topbar-logo-img { display:flex; align-items:center; }
    .topbar-logo-img img { width:36px; height:36px; object-fit:contain; filter:brightness(0) invert(1); }
    .topbar-title { color:white; font-size:15px; font-weight:700; }
    .topbar-sub   { color:rgba(255,255,255,0.75); font-size:11px; margin-top:1px; }
    .hero { background:#1D9E75; padding:0 16px 18px; }
    .hero-id  { font-family:monospace; font-size:11px; color:rgba(255,255,255,0.65); margin-bottom:2px; }
    .hero-mid { font-family:monospace; font-size:11px; color:rgba(255,255,255,0.55); margin-bottom:6px; }
    .hero-name{ font-size:22px; font-weight:700; color:white; margin-bottom:2px; }
    .hero-loc { font-size:13px; color:rgba(255,255,255,0.8); }
    .badges { display:flex; gap:6px; padding:10px 14px; background:white; border-bottom:1px solid #eee; flex-wrap:wrap; }
    .badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
    .badge-green  { background:#EAF3DE; color:#27500A; }
    .badge-blue   { background:#E6F1FB; color:#0C447C; }
    .badge-amber  { background:#FAEEDA; color:#633806; }
    .badge-red    { background:#FCEBEB; color:#791F1F; }
    .badge-purple { background:#EEEDFE; color:#3C3489; }
    .badge-teal   { background:#E0F5F1; color:#0D6655; }
    .umur-row { display:flex; gap:8px; margin:8px 12px; }
    .umur-card { flex:1; background:white; border-radius:12px; border:1px solid #eaeaea; padding:14px 10px; text-align:center; }
    .umur-icon  { font-size:18px; margin-bottom:3px; }
    .umur-label { font-size:11px; color:#888; margin-bottom:4px; }
    .umur-val   { font-size:26px; font-weight:700; color:#1D9E75; line-height:1.1; }
    .umur-val.warn   { color:#BA7517; }
    .umur-val.danger { color:#E24B4A; }
    .umur-unit  { font-size:11px; color:#aaa; margin-top:2px; }
    .umur-sub   { font-size:10px; color:#bbb; margin-top:5px; line-height:1.4; }
    .umur-bar-wrap { margin-top:7px; background:#f0f0f0; border-radius:4px; height:4px; }
    .umur-bar { height:4px; border-radius:4px; background:#1D9E75; }
    .umur-bar.amber { background:#BA7517; }
    .umur-bar.red   { background:#E24B4A; }
    .section { background:white; margin:8px 12px; border-radius:12px; overflow:hidden; border:1px solid #eaeaea; }
    .section-header { padding:10px 14px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:7px; }
    .section-icon { width:26px; height:26px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .si-green  { background:#EAF3DE; color:#1D9E75; }
    .si-blue   { background:#E6F1FB; color:#185FA5; }
    .si-orange { background:#FEF3E2; color:#B45309; }
    .section-icon svg { width:14px; height:14px; }
    .section-title { font-size:12px; font-weight:600; color:#555; text-transform:uppercase; letter-spacing:0.04em; }
    .row-item { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid #f5f5f5; }
    .row-item:last-child { border-bottom:none; }
    .row-label { color:#777; font-size:13px; }
    .row-value { font-size:13px; font-weight:500; color:#1a1a1a; text-align:right; }
    .row-value.good   { color:#1D9E75; }
    .row-value.warn   { color:#BA7517; }
    .row-value.danger { color:#E24B4A; }
    .grade-card { margin:8px 12px; border-radius:12px; overflow:hidden; border:1px solid #eaeaea; }
    .grade-inner { display:flex; align-items:center; gap:14px; padding:16px; background:white; }
    .grade-circle { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700; flex-shrink:0; }
    .grade-a { background:#EAF3DE; color:#1D9E75; }
    .grade-b { background:#FAEEDA; color:#BA7517; }
    .grade-c { background:#FCEBEB; color:#E24B4A; }
    .grade-label { font-size:12px; color:#888; margin-bottom:2px; }
    .grade-desc  { font-size:13px; font-weight:500; color:#1a1a1a; }
    .grade-range { font-size:11px; color:#aaa; margin-top:2px; }
    .metric-row { display:flex; gap:8px; margin:8px 12px; }
    .metric-card { flex:1; background:white; border-radius:12px; border:1px solid #eaeaea; padding:14px; }
    .metric-label { font-size:12px; color:#888; margin-bottom:4px; }
    .metric-val   { font-size:24px; font-weight:700; color:#1D9E75; }
    .metric-unit  { font-size:13px; font-weight:400; color:#aaa; margin-left:2px; }
    .bar-wrap { margin-top:8px; background:#f0f0f0; border-radius:4px; height:4px; }
    .bar-fill { height:4px; border-radius:4px; background:#1D9E75; }
    .bar-fill.amber { background:#BA7517; }
    .bar-fill.red   { background:#E24B4A; }
    .metric-sub { font-size:11px; color:#bbb; margin-top:3px; }
    .consume-current { display:flex; align-items:center; gap:14px; padding:16px 14px; border-bottom:1px solid #f0f0f0; }
    .consume-badge { width:56px; height:56px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
    .cb-crispy{background:#EAF3DE;} .cb-firm{background:#E6F1FB;} .cb-soft{background:#FAEEDA;} .cb-none{background:#f0f0f0;}
    .consume-badge-icon { font-size:22px; }
    .consume-info-label { font-size:11px; color:#888; margin-bottom:2px; }
    .consume-info-title { font-size:16px; font-weight:700; margin-bottom:2px; }
    .ct-crispy{color:#27500A;} .ct-firm{color:#0C447C;} .ct-soft{color:#633806;} .ct-none{color:#999;}
    .consume-info-desc { font-size:12px; color:#666; line-height:1.5; }
    .consume-info-hsp  { font-size:11px; color:#aaa; margin-top:3px; }
    .consume-timeline  { padding:10px 14px 4px; }
    .consume-tl-label  { font-size:11px; color:#888; margin-bottom:8px; font-weight:500; text-transform:uppercase; letter-spacing:0.04em; }
    .tl-scroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; }
    .tl-scroll::-webkit-scrollbar { height:3px; }
    .tl-scroll::-webkit-scrollbar-thumb { background:#ccc; border-radius:2px; }
    .tl-item { flex-shrink:0; width:68px; border-radius:8px; padding:8px 4px; text-align:center; border:1.5px solid transparent; }
    .tl-item.active { border-color:#1D9E75; box-shadow:0 0 0 2px rgba(29,158,117,0.15); }
    .tl-item.tl-crispy{background:#EAF3DE;} .tl-item.tl-firm{background:#E6F1FB;} .tl-item.tl-soft{background:#FAEEDA;}
    .tl-item-hsp  { font-size:10px; font-weight:700; color:#555; margin-bottom:2px; }
    .tl-item-tgl  { font-size:9px; color:#888; margin-bottom:3px; }
    .tl-item-icon { font-size:15px; margin-bottom:1px; }
    .tl-item-tex  { font-size:9px; font-weight:600; color:#555; }
    .tl-item.active .tl-item-hsp { color:#1D9E75; }
    .consume-legend { display:flex; gap:10px; padding:4px 14px 12px; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:#666; }
    .legend-dot  { width:10px; height:10px; border-radius:3px; }
    .ld-crispy{background:#EAF3DE; border:1px solid #9FE1CB;}
    .ld-firm  {background:#E6F1FB; border:1px solid #9BC4E8;}
    .ld-soft  {background:#FAEEDA; border:1px solid #F0C882;}
    .footer { text-align:center; padding:18px 16px 36px; }
    .footer-logo { width:48px; height:48px; object-fit:contain; margin:0 auto 8px; display:block; opacity:0.6; }
    .footer-text { color:#aaa; font-size:11px; line-height:1.6; }
    .footer-text strong { color:#1D9E75; }
    .loading { text-align:center; padding:60px 20px; color:#888; }
    .loading-spinner { width:32px; height:32px; border:3px solid #eee; border-top-color:#1D9E75; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-box { margin:20px 12px; background:#fff8f8; border:1px solid #f5c0c0; border-radius:12px; padding:20px; text-align:center; }
    .error-box h3 { color:#c0392b; margin-bottom:6px; }
    .error-box p  { color:#888; font-size:13px; margin-top:6px; }
    .error-box code { background:#f0f0f0; padding:2px 6px; border-radius:4px; font-size:11px; word-break:break-all; display:block; margin-top:6px; }
  </style>
</head>

    column      : "Column",
    kondisi     : "Kondisi",
    bobot       : "Bobot (gr)",
    brix        : "Brix",
    grading     : "Grading"
  };

  function getPlantId() {
    return new URLSearchParams(window.location.search).get("id") || "";
  }

  function v(p, key) {
    var x = p[key];
    if (x === null || x === undefined || x === "") return "-";
    return String(x);
  }

  function parseDate(raw) {
    if (!raw || raw === "-") return null;
    var s = String(raw).trim();
    var d;

    // Format gviz: Date(2026,3,10) — bulan 0-indexed!
    var gvizMatch = s.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})\)$/);
    if (gvizMatch) {
      d = new Date(+gvizMatch[1], +gvizMatch[2], +gvizMatch[3]);
      return (!isNaN(d.getTime())) ? d : null;
    }
    // DD/MM/YYYY
    if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
      var pt = s.split("/");
      d = new Date(+pt[2], +pt[1]-1, +pt[0]);
    // YYYY-MM-DD
    } else if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
      d = new Date(s + "T00:00:00");
    // Google Sheets serial number
    } else if (/^\d+(\.\d+)?$/.test(s)) {
      d = new Date(Math.round((parseFloat(s)-25569)*86400000));
    } else {
      d = new Date(s);
    }
    return (d && !isNaN(d.getTime())) ? d : null;
  }

  function formatTgl(raw) {
    var d = parseDate(raw);
    if (!d) return (raw && raw !== "-") ? raw : "-";
    var bl = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    return d.getDate() + " " + bl[d.getMonth()] + " " + d.getFullYear();
  }

  function selisih(d1, d2) {
    if (!d1 || !d2) return null;
    var a = new Date(d1); a.setHours(0,0,0,0);
    var b = new Date(d2); b.setHours(0,0,0,0);
    return Math.round((b-a)/86400000);
  }

  function getGrading(bobot, gradingSheet) {
    // Gunakan grading dari Sheets jika ada, fallback hitung otomatis
    if (gradingSheet && gradingSheet !== "-") return gradingSheet;
    var b = parseFloat(bobot);
    if (isNaN(b)) return "?";
    if (b >= 1050) return "A";
    if (b >= 800)  return "B";
    return "C";
  }

  function getGradingInfo(grade) {
    if (grade === "A") return {cls:"grade-a", badge:"badge-green", label:"Grade A - Kualitas Terbaik",  range:"Bobot >= 1050 gr"};
    if (grade === "B") return {cls:"grade-b", badge:"badge-amber", label:"Grade B - Kualitas Standar",  range:"Bobot 800 - 1049 gr"};
    if (grade === "C") return {cls:"grade-c", badge:"badge-red",   label:"Grade C - Di Bawah Standar", range:"Bobot < 800 gr"};
    return                    {cls:"grade-b", badge:"badge-amber", label:"Data belum tersedia",         range:"-"};
  }

  function getBestConsume(varietas, hsp) {
    var isInthanon = (varietas||"").toLowerCase().indexOf("inthanon") >= 0;
    if (hsp < 0) return null;
    if (isInthanon) {
      if (hsp >= 1 && hsp <= 3)  return {tex:"Crispy", cls:"crispy", icon:"🥒", desc:"Daging buah renyah dan segar, kandungan air tinggi. Terbaik untuk konsumsi langsung.", range:"HSP 1-3"};
      if (hsp >= 4 && hsp <= 10) return {tex:"Firm",   cls:"firm",   icon:"🍈", desc:"Tekstur padat dan sedikit kenyal. Rasa manis optimal, cocok untuk sajian buah.", range:"HSP 4-10"};
      return                            {tex:"Soft",   cls:"soft",   icon:"🍯", desc:"Daging buah lembut dan sangat manis. Cocok untuk jus, smoothie, atau olahan.", range:"HSP > 10"};
    } else {
      if (hsp >= 1 && hsp <= 4)  return {tex:"Crispy", cls:"crispy", icon:"🥒", desc:"Daging buah renyah dan segar, kandungan air tinggi. Terbaik untuk konsumsi langsung.", range:"HSP 1-4"};
      if (hsp >= 5 && hsp <= 7)  return {tex:"Firm",   cls:"firm",   icon:"🍈", desc:"Tekstur padat dan sedikit kenyal. Rasa manis optimal, cocok untuk sajian buah.", range:"HSP 5-7"};
      return                            {tex:"Soft",   cls:"soft",   icon:"🍯", desc:"Daging buah lembut dan sangat manis. Cocok untuk jus, smoothie, atau olahan.", range:"HSP > 7"};
    }
  }

    var el = document.getElementById(id);

    var el = document.getElementById(id);

  function renderBestConsume(varietas, dPanen) {
    var today = new Date(); today.setHours(0,0,0,0);
    if (!dPanen) {
      var badge = document.getElementById("bc-badge");
      if (badge) badge.className = "consume-badge cb-none";
      setText("bc-icon",  "⏳");
      setText("bc-title", "Tanggal panen belum diisi");
      setText("bc-desc",  "Isi kolom Tanggal Panen di Sheets untuk melihat panduan tekstur.");
      setText("bc-hsp",   "");
      setText("bc-hsp-day", "0");
      return;
    }

    var panen    = new Date(dPanen); panen.setHours(0,0,0,0);
    var hspToday = Math.round((today-panen)/86400000);
    var cur      = getBestConsume(varietas, hspToday);

    var badge = document.getElementById("bc-badge");
    if (cur && hspToday >= 0) {
      if (badge) badge.className = "consume-badge cb-"+cur.cls;
      setText("bc-icon",    cur.icon);
      setText("bc-title",   cur.tex);
      var titleEl = document.getElementById("bc-title");
      if (titleEl) titleEl.className = "consume-info-title ct-"+cur.cls;
      setText("bc-desc",    cur.desc);
      setText("bc-hsp",     "Rentang tekstur: "+cur.range);
      setText("bc-hsp-day", String(hspToday));
    } else {
      if (badge) badge.className = "consume-badge cb-none";
      setText("bc-icon",    hspToday < 0 ? "⏳" : "🌿");
      setText("bc-title",   hspToday < 0 ? "Belum dipanen" : "Baru dipanen hari ini");
      var titleEl2 = document.getElementById("bc-title");
      if (titleEl2) titleEl2.className = "consume-info-title ct-none";
      setText("bc-desc",    hspToday < 0
        ? "Estimasi panen dalam "+Math.abs(hspToday)+" hari lagi."
        : "Mulai konsumsi besok (HSP ke-1) untuk tekstur terbaik.");
      setText("bc-hsp",     "");
      setText("bc-hsp-day", String(Math.max(hspToday, 0)));
    }

    // Timeline 0-14 HSP
    var tl  = document.getElementById("bc-timeline");
    if (!tl) return;
    var mn  = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];
    var html = [];
    for (var d = 0; d <= 14; d++) {
      var tglItem = new Date(panen); tglItem.setDate(tglItem.getDate()+d);
      var info    = getBestConsume(varietas, d);
      if (!info) { info = {tex:"Baru",cls:"firm",icon:"🌿"}; }
      var active  = (d === hspToday);
      var tglStr  = tglItem.getDate()+" "+mn[tglItem.getMonth()];
      html.push(
        '<div class="tl-item tl-'+info.cls+(active?' active':'')+'">',
          '<div class="tl-item-hsp">HSP '+d+(active?' ★':'')+'</div>',
          '<div class="tl-item-tgl">'+tglStr+'</div>',
          '<div class="tl-item-icon">'+info.icon+'</div>',
          '<div class="tl-item-tex">'+info.tex+'</div>',
        '</div>'
      );
    }
    tl.innerHTML = html.join("");
  }

  function fetchAndRender() {
    var plantId = getPlantId();
    if (!plantId) { renderError("(kosong)", "URL tidak mengandung ?id="); return; }

    var url = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&gid="+GID;
    fetch(url)
      .then(function(r){ return r.text(); })
      .then(function(text){
        var s = text.indexOf("("), e = text.lastIndexOf(")");
        if (s<0||e<0) throw new Error("Format response tidak valid");
        var json = JSON.parse(text.slice(s+1,e));
        if (!json.table) throw new Error("Tabel kosong - cek akses Sheets");

        var cols = json.table.cols.map(function(c){ return (c.label||"").trim(); });
        var rows = json.table.rows || [];
        var found = null;

        for (var i=0; i<rows.length; i++) {
          var row = rows[i];
          if (!row||!row.c) continue;
          var obj = {};
          for (var j=0; j<cols.length; j++) {
            var cell = row.c[j];
            if (cell && cell.v !== null && cell.v !== undefined) {
              // Untuk tanggal: simpan sebagai "Date(Y,M,D)" agar bisa di-parse
              var cv = cell.v;
              if (typeof cv === "object" && cv !== null && cv.constructor) {
                // Object Date dari gviz
                var tmp = new Date(cv);
                if (!isNaN(tmp.getTime())) {
                  obj[cols[j]] = "Date("+tmp.getFullYear()+","+(tmp.getMonth()+1)+","+tmp.getDate()+")";
                } else {
                  obj[cols[j]] = cell.f || String(cv);
                }
              } else if (cell.f && String(cv).match(/^\d+(\.\d+)?$/) && String(cell.f).match(/[a-zA-Z]/)) {
                // Serial number dengan formatted string (misal "1/4/2026")
                obj[cols[j]] = cell.f;
              } else {
                obj[cols[j]] = cv;
              }
            } else { obj[cols[j]] = ""; }
          }
          var rowId = String(obj["ID Tanaman"]||"").trim();
          if (!rowId) continue;
          if (rowId === plantId.trim()) { found = obj; break; }
        }

        if (found) render(found);
        else renderError(plantId, "Kolom terbaca: ["+cols.join(", ")+"]");
      })
      .catch(function(e){
        console.error(e);
        renderError(plantId, e.message);
      });
  }

  fetchAndRender();
</script>
